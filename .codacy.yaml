# Codacy configuration
# Exclude the test suite from analysis. Tests are validated by running them
# (pytest / ruff / mypy in CI), not by Codacy's security/quality scanners.
# This mirrors the project's own bandit settings in pyproject.toml
# ([tool.bandit] exclude_dirs = ["tests"], skips = ["B101"]) and the ruff
# per-file ignores for tests, which suppress scanner false positives on
# test-only asserts and dummy credential fixtures.
exclude_paths:
  - 'tests/**'
